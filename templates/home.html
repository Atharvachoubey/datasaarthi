<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataSaarthi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Navbar */
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Logo */
.logo {
    color: white;
    font-size: 24px;
    font-weight: 600;
}

/* Logout Button */
.logout {
    color: white;
    text-decoration: none;
    border: 1px solid white;
    padding: 8px 18px;
    border-radius: 20px;
    transition: 0.3s;
}

.logout:hover {
    background: white;
    color: #333;
}

/* Body */
body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.container {
    text-align: center;
    background: rgba(255,255,255,0.1);
    padding: 50px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
h1 {
    color: white;
    font-size: 40px;
    font-weight: 600;
}

p {
    color: #ddd;
    margin-bottom: 30px;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 15px 35px;
    margin: 15px;
    font-size: 18px;
    border-radius: 50px;
    text-decoration: none;
    transition: 0.3s;
    font-weight: 500;
}

.btn-fill {
    background: #00f2fe;
    color: black;
}

.btn-fill:hover {
    background: #4facfe;
    transform: scale(1.05);
}

.btn-search {
    background: white;
    color: #333;
}

.btn-search:hover {
    background: #ddd;
    transform: scale(1.05);
}

/* Footer */
.footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: #ccc;
    font-size: 14px;
}
/* Navbar */
.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Stylish Logo */
.logo {
    color: white;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 1px;
}

.logo span {
    color: #00f2fe;
}

/* Tagline */
.tagline {
    font-size: 12px;
    color: #ddd;
    margin-top: 2px;
}

/* Header Line */
.header-line {
    position: absolute;
    top: 80px;
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.2);
}

/* Logout */
.logout {
    color: white;
    text-decoration: none;
    border: 1px solid white;
    padding: 8px 18px;
    border-radius: 20px;
    transition: 0.3s;
}

.logout:hover {
    background: white;
    color: #333;
}
</style>
</head>

<body>


<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        Data<span>Saarthi</span>
        <div class="tagline">Smart Record Management</div>
    </div>

    <a href="#" class="logout">Logout</a>

</div>

<!-- LINE BELOW HEADER -->
<div class="header-line"></div>

<!-- MAIN CARD -->
<div class="container">

    <h1>DataSaarthi</h1>
    <p>Smart Record Management System</p>

 <a href="{% url 'addnew' %}" class="btn btn-fill">➕ Fill New Record</a>
    <a href="{% url 'search' %}" class="btn btn-search">🔍 Search Records</a>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 DataSaarthi | Smart & Secure System
</div>

</body>
</html>
